<!-- PAGE: TRANSCRIBE -->
<div id="page-transcribe" class="page">
  <div class="page-layout-2col">

    <!-- LEFT: Settings + TTS Preview + Voice FX -->
    <div>

      <!-- Settings card -->
      <div class="card card-collapsible card-has-body">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-title">🎙 Cài đặt phiên âm</span>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Thư mục video</label>
            <input type="text" id="tr-dir" value="./Downloaded" placeholder="./Downloaded">
          </div>
          <div class="field">
            <label>File đơn (video hoặc .ass)</label>
            <div class="flex-center gap-8">
              <input type="text" id="tr-file" placeholder="Đường dẫn file..." style="flex:1">
              <button class="btn btn-secondary btn-sm" onclick="document.getElementById('tr-import-file').click()">📂 Chọn</button>
              <input type="file" id="tr-import-file" accept="video/*,.ass" style="display:none">
            </div>
            <div class="text-xs text-muted mt-4" id="tr-file-name">--</div>
          </div>
          <div class="field">
            <label>Thư mục xuất</label>
            <input type="text" id="tr-out" placeholder="Để trống = cùng thư mục video">
          </div>

          <div class="grid-2">
            <div class="field">
              <label>Phiên âm bằng</label>
              <select id="tr-provider">
                <option value="groq" selected>Groq Whisper API (cloud, nhanh)</option>
                <option value="model">Whisper local (chậm hơn)</option>
              </select>
            </div>
            <div class="field">
              <label>Ngôn ngữ gốc</label>
              <select id="tr-lang">
                <option value="zh" selected>Tiếng Trung</option>
                <option value="vi">Tiếng Việt</option>
                <option value="en">Tiếng Anh</option>
                <option value="ja">Tiếng Nhật</option>
                <option value="ko">Tiếng Hàn</option>
              </select>
            </div>
          </div>

          <div class="field" id="tr-model-row" style="display:none">
            <label>Mô hình Whisper local</label>
            <select id="tr-model">
              <option value="tiny">tiny (nhanh nhất)</option>
              <option value="base" selected>base</option>
              <option value="small">small</option>
              <option value="medium">medium</option>
              <option value="large">large (chính xác nhất)</option>
            </select>
          </div>

          <div class="check-grid mt-8 mb-12">
            <label class="check-item"><input type="checkbox" id="tr-srt"><span>Xuất file .srt</span></label>
            <label class="check-item"><input type="checkbox" id="tr-skip" checked><span>Bỏ qua file đã có</span></label>
            <label class="check-item"><input type="checkbox" id="tr-sc"><span>Phồn → giản thể</span></label>
          </div>

          <div class="btn-group">
            <button class="btn btn-primary" id="btn-tr" onclick="startTranscribe()" data-i18n="btn_start_tr">▶ Bắt đầu phiên âm</button>
            <button class="btn btn-secondary" onclick="extractAudioOnly()">🎵 Tách MP3</button>
            <button class="btn btn-secondary" onclick="generateTtsFromAss()">🔊 Tạo MP3 từ .ass</button>
          </div>
        </div>
      </div>

      <!-- TTS Preview card -->
      <div class="card card-collapsible card-has-body">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-title">🔊 Nghe thử giọng TTS</span>
        </div>
        <div class="card-body">
          <div class="grid-2">
            <div class="field">
              <label>TTS Engine</label>
              <select id="tr-tts-engine">
                <option value="fpt-ai" selected>FPT AI TTS</option>
                <option value="edge-tts">Edge TTS (Microsoft)</option>
                <option value="elevenlabs">ElevenLabs TTS</option>
                <option value="fish-audio">Fish Audio TTS (đa ngôn ngữ)</option>
                <option value="minimax">MiniMax TTS</option>
                <option value="gtts">gTTS (Google)</option>
              </select>
            </div>
            <div class="field">
              <label>Giọng đọc</label>
              <select id="tr-tts-voice"></select>
            </div>
            <div class="field">
              <label>Cao độ</label>
              <input type="text" id="tr-tts-pitch" placeholder="+0Hz" value="+0Hz">
            </div>
            <div class="field">
              <label>Tốc độ đọc</label>
              <input type="text" id="tr-tts-rate" placeholder="+0%" value="+0%">
            </div>
          </div>
          <div class="field">
            <label>Cảm xúc</label>
            <select id="tr-tts-emotion">
              <option value="default" selected>Mặc định</option>
              <option value="cheerful">Vui vẻ</option>
              <option value="sad">Buồn</option>
              <option value="angry">Giận dữ</option>
              <option value="excited">Hào hứng</option>
              <option value="friendly">Thân thiện</option>
            </select>
          </div>
          <div class="field">
            <label>Nội dung nghe thử / tạo MP3</label>
            <textarea id="tr-preview-text" rows="4" placeholder="Nhập văn bản để nghe thử hoặc tạo file MP3..."></textarea>
          </div>
          <div class="field">
            <label>Tên file MP3 xuất ra (tuỳ chọn)</label>
            <input type="text" id="tr-tts-filename" placeholder="vd: my_audio.mp3 (để trống = tự đặt tên)">
          </div>
          <div class="flex-center gap-8 mt-8">
            <button class="btn btn-secondary btn-sm" id="btn-tr-preview" onclick="previewTranscribeVoice()">▶ Nghe thử</button>
            <button class="btn btn-primary btn-sm" id="btn-tr-tts-mp3" onclick="createMp3FromText()">💾 Tạo &amp; tải MP3</button>
            <audio id="tr-preview-audio" controls style="display:none;height:32px;flex:1"></audio>
          </div>
        </div>
      </div>

      <!-- Voice FX card (collapsed) -->
      <div class="card card-collapsible collapsed card-has-body">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-title">🎚 Hiệu ứng giọng (FX)</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <label class="toggle-wrap">
              <input type="checkbox" class="toggle-input" id="tr-fx-enabled">
              <div class="toggle"></div>
              <span class="toggle-label text-sm">Bật</span>
            </label>
          </div>
        </div>
        <div class="card-body">
          <div class="grid-2">
            <div class="field"><label>Pitch (bán âm)</label><input type="number" id="tr-fx-pitch" step="0.1" value="1.5"></div>
            <div class="field"><label>Speed</label><input type="number" id="tr-fx-speed" step="0.01" value="1.08"></div>
          </div>
          <div class="grid-3 mt-8">
            <div class="field"><label>Bass (dB)</label><input type="number" id="tr-fx-bass" step="1" value="-2"></div>
            <div class="field"><label>Mid (dB)</label><input type="number" id="tr-fx-mid" step="1" value="2"></div>
            <div class="field"><label>Treble (dB)</label><input type="number" id="tr-fx-treble" step="1" value="3"></div>
          </div>
          <div class="grid-2 mt-8">
            <div class="field">
              <label>Nén (Comp)</label>
              <select id="tr-fx-comp">
                <option value="none" selected>Tắt</option>
                <option value="light">Nhẹ</option>
                <option value="heavy">Mạnh</option>
              </select>
            </div>
            <div class="field"><label>Vang (Reverb %)</label><input type="number" id="tr-fx-reverb" min="0" max="100" value="5"></div>
          </div>
        </div>
      </div>

    </div><!-- end left -->

    <!-- RIGHT: Progress + Log -->
    <div>

      <!-- Progress card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📊 Tiến trình</span>
        </div>
        <div class="progress-row">
          <span class="progress-label">Tổng thể</span>
          <div class="progress-bar-wrap"><div class="progress-bar pb-overall" id="pb-tr-overall"></div></div>
          <span class="progress-pct" id="pb-tr-overall-pct">0%</span>
        </div>
        <div class="progress-info text-muted mb-8" id="lbl-tr-overall">--</div>
        <div class="progress-row">
          <span class="progress-label">File hiện tại</span>
          <div class="progress-bar-wrap"><div class="progress-bar pb-step" id="pb-tr-file"></div></div>
          <span class="progress-pct" id="pb-tr-file-pct">0%</span>
        </div>
        <div class="progress-info text-muted" id="lbl-tr-file">--</div>
      </div>

      <!-- Log card -->
      <div class="card card-collapsible card-has-body">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-title">📝 Nhật ký</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="btn btn-secondary btn-sm" onclick="clearLog('tr-log')">Xóa</button>
          </div>
        </div>
        <div class="card-body">
          <div class="log-box" id="tr-log" style="height:320px"></div>
        </div>
      </div>

    </div><!-- end right -->
  </div><!-- end page-layout-2col -->

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Sync provider → toggle hiển thị model selector
    const provEl = document.getElementById('tr-provider');
    const modelRow = document.getElementById('tr-model-row');
    function _trSyncProvider() {
      if (!modelRow || !provEl) return;
      modelRow.style.display = (provEl.value === 'model') ? '' : 'none';
    }
    provEl?.addEventListener('change', _trSyncProvider);
    _trSyncProvider();

    // Khi user gõ/sửa input path bằng tay → invalidate file đã chọn trước đó.
    document.getElementById('tr-file')?.addEventListener('input', function() {
      window._trSelectedFile = null;
      const label = document.getElementById('tr-file-name');
      if (label && !this.value.trim()) label.textContent = '--';
    });

    // Note: listener cho #tr-import-file đã được khai báo ở app.js,
    // không khai báo lại để tránh ghi đè nhau.
  });
  </script>
</div>
