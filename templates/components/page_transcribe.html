<!-- PAGE: TRANSCRIBE -->
<div id="page-transcribe" class="page">

  <style>
    /* ── Sidebar-nav layout (mirrors story->video style) ── */
    #page-transcribe .tr-shell {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }
    #page-transcribe .tr-nav {
      flex: 0 0 170px;
      width: 170px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 16px;
      border-right: 1px solid var(--border, #c7d7f5);
      position: sticky;
      top: 8px;
    }
    #page-transcribe .tr-nav-btn {
      width: 100%;
      margin: 0;
      justify-content: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-align: left;
      font-size: 13px;
      line-height: 1.3;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text, #172033);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: border-color .12s, background .12s;
    }
    #page-transcribe .tr-nav-btn:hover {
      border-color: var(--border, #c7d7f5);
      background: var(--bg, #f8fbff);
    }
    #page-transcribe .tr-nav-btn.active {
      border-color: var(--accent, #2563eb);
      background: var(--accent-light, #eaf1ff);
      color: var(--accent, #2563eb);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, .12);
    }
    #page-transcribe .tr-nav-ico { font-size: 16px; flex: 0 0 auto; }
    #page-transcribe .tr-panes { flex: 1 1 auto; min-width: 0; }
    #page-transcribe .tr-pane { display: none; }
    #page-transcribe .tr-pane.active { display: block; }

    /* ── Responsive: collapse sidebar to horizontal tabs ── */
    @media (max-width: 760px) {
      #page-transcribe .tr-shell { flex-direction: column; gap: 12px; }
      #page-transcribe .tr-nav {
        flex: none;
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        padding-right: 0;
        padding-bottom: 10px;
        border-right: none;
        border-bottom: 1px solid var(--border, #c7d7f5);
        position: static;
      }
      #page-transcribe .tr-nav-btn {
        width: auto;
        flex: 1 1 auto;
        min-width: 100px;
        justify-content: center;
      }
    }

    /* ── Voice manager ── */
    #page-transcribe .tr-voice-workbench {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 14px;
      min-height: 410px;
    }
    #page-transcribe .tr-voice-mode-nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid var(--border, #c7d7f5);
      padding-right: 14px;
    }
    #page-transcribe .tr-voice-mode {
      border: 1px solid var(--border, #c7d7f5);
      border-radius: 8px;
      background: var(--bg, #f8fbff);
      color: var(--text, #172033);
      min-height: 62px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      text-align: center;
    }
    #page-transcribe .tr-voice-mode.active {
      border-color: var(--accent, #2563eb);
      background: var(--accent-light, #eaf1ff);
      color: var(--accent, #2563eb);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, .12);
    }
    #page-transcribe .tr-voice-panel { display: none; }
    #page-transcribe .tr-voice-panel.active { display: block; }
    #page-transcribe .tr-voice-toolbar {
      display: grid;
      grid-template-columns: minmax(0, auto) minmax(220px, 1fr);
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    #page-transcribe .tr-voice-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    #page-transcribe .tr-voice-tabs .active {
      background: var(--accent, #2563eb);
      color: #fff;
      border-color: var(--accent, #2563eb);
    }
    #page-transcribe .tr-voice-library {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
      padding-right: 2px;
    }
    #page-transcribe .tr-voice-card {
      border: 1px solid var(--border, #c7d7f5);
      border-radius: 8px;
      background: var(--bg, #f8fbff);
      padding: 10px 12px;
      min-height: 58px;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(120px, 1.2fr) minmax(160px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    #page-transcribe .tr-voice-card:hover,
    #page-transcribe .tr-voice-card.selected {
      border-color: var(--accent, #2563eb);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, .12);
    }
    #page-transcribe .tr-voice-card-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 13px;
      color: var(--text, #172033);
    }
    #page-transcribe .tr-voice-card small {
      color: var(--text-muted, #64748b);
      font-size: 11.5px;
      overflow-wrap: anywhere;
    }
    #page-transcribe .tr-voice-card-meta {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: auto;
    }
    #page-transcribe .tr-voice-pill {
      border-radius: 999px;
      padding: 2px 6px;
      background: var(--accent-light, #eaf1ff);
      color: var(--text, #172033);
      font-size: 10px;
      line-height: 1.2;
    }
    #page-transcribe .tr-voice-editor-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    #page-transcribe .tr-voice-hidden-list {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
    }
    #page-transcribe .tr-voice-hidden-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border, #c7d7f5);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--bg, #f8fbff);
    }
    @media (max-width: 760px) {
      #page-transcribe .tr-voice-workbench {
        grid-template-columns: 1fr;
      }
      #page-transcribe .tr-voice-mode-nav {
        border-right: 0;
        border-bottom: 1px solid var(--border, #c7d7f5);
        padding-right: 0;
        padding-bottom: 12px;
      }
      #page-transcribe .tr-voice-toolbar {
        grid-template-columns: 1fr;
      }
      #page-transcribe .tr-voice-card {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="card">
    <div class="card-header">
      <span class="card-title">🔊 Phiên âm &amp; TTS</span>
    </div>

            <span class="tr-nav-ico">🔊</span><span>Tạo giọng nói</span>
          </button>

          </button>

        <!-- ── Content panes ── -->

          <!-- ════════════════════════════════════════════

          ════════════════════════════════════════════ -->

                    <select id="tr-tts-lang">

                      <option value="zh">Tiếng Trung</option>
                      <option value="ja">Tiếng Nhật</option>
                      <option value="ko">Tiếng Hàn</option>
                      <option value="th">Tiếng Thái</option>
                      <option value="id">Tiếng Indonesia</option>
                      <option value="fr">Tiếng Pháp</option>
                      <option value="de">Tiếng Đức</option>
                      <option value="es">Tiếng Tây Ban Nha</option>
                    </select>
                  </div>
                  <div class="field">
                    <label>TTS Engine</label>
                    <select id="tr-tts-engine">
                      <option value="vieneu" selected>VieNeu TTS (local)</option>
                      <option value="edge-tts">Microsoft Edge TTS</option>
                      <option value="gtts">Google gTTS (dự phòng)</option>
                      <option value="fpt-ai">FPT AI TTS</option>
                      <option value="elevenlabs">ElevenLabs TTS</option>

                      <option value="minimax">MiniMax TTS</option>
                    </select>

                    <select id="tr-tts-voice"></select>

                    <label>Cao độ</label>
                    <input type="text" id="tr-tts-pitch" placeholder="+0Hz" value="+0Hz">

                  <div class="field">
                    <label>Tốc độ đọc</label>
                    <input type="text" id="tr-tts-rate" placeholder="+0%" value="+0%">
                  </div>
                </div>
                <div class="field">
                  <label>Cảm xúc</label>
                  <select id="tr-tts-emotion">
                    <option value="default" selected>Mặc định</option>
                    <option value="cheerful">Vui vẻ</option>
                    <option value="excited">Hào hứng</option>
                    <option value="friendly">Thân thiện</option>
                    <option value="empathetic">Đồng cảm</option>
                    <option value="hopeful">Hy vọng</option>
                    <option value="sad">Buồn</option>
                    <option value="angry">Giận dữ</option>
                    <option value="newscast">Bản tin</option>
                    <option value="narration-professional">Kể chuyện chuyên nghiệp</option>

                    <option value="whispering">Thì thầm</option>
                    <option value="shouting">Nhấn mạnh</option>

                </div>
                <input type="hidden" id="tr-tts-persona" value="">
                <div class="field">
                  <label>Nội dung nghe thử / tạo MP3</label>

                  <label>Tên file MP3 xuất ra (tuỳ chọn)</label>

                  <button class="btn btn-secondary btn-sm" id="btn-tr-preview" onclick="previewTranscribeVoice()">▶ Nghe thử</button>
                  <button class="btn btn-primary btn-sm" id="btn-tr-tts-mp3" onclick="createMp3FromText()">💾 Tạo &amp; tải MP3</button>
                  <audio id="tr-preview-audio" controls style="display:none;height:32px;flex:1"></audio>
                </div>
              </div>
            </div>

            <!-- ── Phiên âm (settings) ── -->
            <div class="card card-collapsible card-has-body" style="margin-top:12px">
              <div class="card-header" onclick="toggleCard(this)">
                <span class="card-title">🎙 Phiên âm</span>
              </div>
              <div class="card-body">
                <div class="field">
                  <label>Thư mục video</label>
                  <input type="text" id="tr-dir" value="./Downloaded" placeholder="./Downloaded">

                  <label>File đơn (video hoặc .ass)</label>
                  <div class="flex-center gap-8">
                    <input type="text" id="tr-file" placeholder="Đường dẫn file..." style="flex:1">

                    <input type="file" id="tr-import-file" accept="video/*,.ass" style="display:none">

                  <div class="text-xs text-muted mt-4" id="tr-file-name">--</div>

                  <label>Thư mục xuất</label>
                  <input type="text" id="tr-out" placeholder="Để trống = cùng thư mục video">

                    <label>Phiên âm bằng</label>

                      <option value="vi">Tiếng Việt</option>
                      <option value="en">Tiếng Anh</option>
                      <option value="ja">Tiếng Nhật</option>
                      <option value="ko">Tiếng Hàn</option>

                  <label class="check-item"><input type="checkbox" id="tr-sc"><span>Phồn → giản thể</span></label>
                </div>

                <div class="btn-group">

                  <button class="btn btn-secondary" onclick="generateTtsFromAss()">🔊 Tạo MP3 từ .ass</button>
                </div>
              </div>
            </div>

            <!-- ── Voice FX (collapsed) ── -->
            <div class="card card-collapsible collapsed card-has-body" style="margin-top:12px">
              <div class="card-header" onclick="toggleCard(this)">
                <span class="card-title">🎚 Hiệu ứng giọng (FX)</span>
                <div class="card-actions" onclick="event.stopPropagation()">
                  <label class="toggle-wrap">
                    <input type="checkbox" class="toggle-input" id="tr-fx-enabled">
                    <div class="toggle"></div>
                    <span class="toggle-label text-sm">Bật</span>
                  </label>
                </div>
              </div>
              <div class="card-body">
                <div class="grid-2">
                  <div class="field"><label>Pitch (bán âm)</label><input type="number" id="tr-fx-pitch" step="0.1" value="1.5"></div>
                  <div class="field"><label>Speed</label><input type="number" id="tr-fx-speed" step="0.01" value="1.08"></div>
                </div>
                <div class="grid-3 mt-8">
                  <div class="field"><label>Bass (dB)</label><input type="number" id="tr-fx-bass" step="1" value="-2"></div>
                  <div class="field"><label>Mid (dB)</label><input type="number" id="tr-fx-mid" step="1" value="2"></div>
                  <div class="field"><label>Treble (dB)</label><input type="number" id="tr-fx-treble" step="1" value="3"></div>
                </div>
                <div class="grid-2 mt-8">
                  <div class="field">
                    <label>Nén (Comp)</label>
                    <select id="tr-fx-comp">
                      <option value="none" selected>Tắt</option>
                      <option value="light">Nhẹ</option>
                      <option value="heavy">Mạnh</option>
                    </select>
                  </div>
                  <div class="field"><label>Vang (Reverb %)</label><input type="number" id="tr-fx-reverb" min="0" max="100" value="5"></div>
                </div>
              </div>
            </div>

          </div><!-- /tr-pane[tts] -->

                        <button type="button" class="btn btn-secondary btn-sm" onclick="restoreAllTranscribeHiddenVoices()">Khôi phục tất cả</button>
                      </div>
                      <div id="tr-voice-hidden-list" class="tr-voice-hidden-list"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- ── Preview bên dưới danh sách giọng ── -->
            <div class="card card-collapsible card-has-body" style="margin-top:12px">
              <div class="card-header" onclick="toggleCard(this)">
                <span class="card-title">🔊 Nghe thử giọng đã chọn</span>
              </div>
              <div class="card-body">
                <div class="field">
                  <label>Nội dung nghe thử</label>
                  <textarea id="tr-voice-preview-text" rows="3" placeholder="Nhập văn bản để nghe thử giọng đã chọn..."></textarea>
                </div>
                <div class="flex-center gap-8 mt-8">
                  <button class="btn btn-secondary btn-sm" onclick="previewVoiceFromManager(this)">▶ Nghe thử</button>
                  <button class="btn btn-primary btn-sm" onclick="var t=document.getElementById('tr-preview-text');t.value=this.closest('.card-body').querySelector('textarea').value;createMp3FromText()">💾 Tạo &amp; tải MP3</button>
                  <audio id="tr-voice-preview-audio" controls style="display:none;height:32px;flex:1"></audio>
                </div>
              </div>
            </div>

          </div><!-- /tr-pane[voices] -->

        </div><!-- /tr-panes -->
      </div><!-- /tr-shell -->

      <!-- ── Progress + Log (luôn hiển thị bên dưới) ── -->
      <div style="margin-top:16px">
        <!-- Progress card -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">📊 Tiến trình</span>
          </div>
          <div style="padding:12px">
            <div class="progress-row">
              <span class="progress-label">Tổng thể</span>
              <div class="progress-bar-wrap"><div class="progress-bar pb-overall" id="pb-tr-overall"></div></div>
              <span class="progress-pct" id="pb-tr-overall-pct">0%</span>
            </div>
            <div class="progress-info text-muted mb-8" id="lbl-tr-overall">--</div>
            <div class="progress-row">
              <span class="progress-label">File hiện tại</span>
              <div class="progress-bar-wrap"><div class="progress-bar pb-step" id="pb-tr-file"></div></div>
              <span class="progress-pct" id="pb-tr-file-pct">0%</span>
            </div>
            <div class="progress-info text-muted" id="lbl-tr-file">--</div>
          </div>
        </div>

        <!-- Log card -->
        <div class="card card-collapsible card-has-body" style="margin-top:12px">
          <div class="card-header" onclick="toggleCard(this)">
            <span class="card-title">📝 Nhật ký</span>
            <div class="card-actions" onclick="event.stopPropagation()">
              <button class="btn btn-secondary btn-sm" onclick="clearLog('tr-log')">Xóa</button>
            </div>
          </div>
          <div class="card-body">
            <div class="log-box" id="tr-log" style="height:320px"></div>
          </div>
        </div>
      </div>

    </div><!-- /card-body -->
  </div><!-- /card -->

  <script>
  function previewVoiceFromManager(btn) {
    const textarea = btn.closest('.card-body').querySelector('textarea');
    document.getElementById('tr-preview-text').value = textarea.value;
    previewTranscribeVoice().then(function() {
      const mainAudio = document.getElementById('tr-preview-audio');
      const localAudio = document.getElementById('tr-voice-preview-audio');
      if (mainAudio && localAudio && mainAudio.src) {
        localAudio.src = mainAudio.src;
        localAudio.style.display = 'block';
        try { localAudio.play(); } catch(_) {}
      }
    });
  }

  function switchTranscribePane(paneId) {
    document.querySelectorAll('#page-transcribe .tr-nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.trPane === paneId);
    });
    document.querySelectorAll('#page-transcribe .tr-pane').forEach(p => {
      p.classList.toggle('active', p.dataset.trPane === paneId);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    // Sync provider → toggle hiển thị model selector
    const provEl = document.getElementById('tr-provider');
    const modelRow = document.getElementById('tr-model-row');
    function _trSyncProvider() {
      if (!modelRow || !provEl) return;
      modelRow.style.display = (provEl.value === 'model') ? '' : 'none';
    }
    provEl?.addEventListener('change', _trSyncProvider);
    _trSyncProvider();

    // Khi user gõ/sửa input path bằng tay → invalidate file đã chọn trước đó.
    document.getElementById('tr-file')?.addEventListener('input', function() {
      window._trSelectedFile = null;
      const label = document.getElementById('tr-file-name');
      if (label && !this.value.trim()) label.textContent = '--';
    });
  });
  </script>

</div>
