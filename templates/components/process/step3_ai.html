  <!-- ═════════════════ STEP 3: AI & Giọng đọc ═════════════════ -->
  <section class="proc-step" data-proc-step="3" style="display:none">
    <div class="proc-step-head">
      <h2 class="proc-step-title">🤖 AI & Giọng đọc</h2>
      <p class="proc-step-sub">Chọn mô hình phiên âm/dịch và cấu hình lồng tiếng (tùy chọn).</p>
    </div>

      <!-- AI Model -->
      <div class="card card-collapsible">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-title">🤖 Mô hình AI</span>
        </div>
        <div class="card-body">
          <div class="grid-2">
            <div class="field">
              <label>Mô hình Whisper</label>
              <select id="proc-model">
                <option value="tiny">tiny (nhanh nhất)</option>
                <option value="base" selected>base</option>
                <option value="small">small</option>
                <option value="medium">medium</option>
                <option value="large">large (tốt nhất)</option>
              </select>
            </div>
            <div class="field">
              <label>Ngôn ngữ gốc</label>
              <select id="proc-lang">
                <option value="zh" selected>Tiếng Trung</option>
                <option value="en">Tiếng Anh</option>
                <option value="ja">Tiếng Nhật</option>
                <option value="ko">Tiếng Hàn</option>
              </select>
            </div>
            <div class="field">
              <label>🌐 Ngôn ngữ đầu ra</label>
              <select id="proc-target-lang" onchange="_onTargetLangChange()">
                <option value="vi" selected>🇻🇳 Tiếng Việt</option>
                <option value="en">🇺🇸 English</option>
                <option value="ja">🇯🇵 日本語</option>
                <option value="ko">🇰🇷 한국어</option>
                <option value="th">🇹🇭 ภาษาไทย</option>
                <option value="id">🇮🇩 Bahasa Indonesia</option>
                <option value="es">🇪🇸 Español</option>
                <option value="pt">🇧🇷 Português</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="ar">🇸🇦 العربية</option>
                <option value="hi">🇮🇳 हिन्दी</option>
              </select>
            </div>
            <div class="field">
              <label>Phiên âm bằng</label>
              <select id="proc-transcribe-provider-model">
                <option value="groq" selected>Groq Whisper API</option>
                <option value="model">Whisper local</option>
              </select>
            </div>
            <div class="field">
              <label>Dịch phụ đề bằng</label>
              <select id="proc-trans-provider-model">
                <option value="9router">🔀 9Router</option>
                <option value="deepseek" selected>DeepSeek</option>
                <option value="groq">Groq</option>
                <option value="openai">OpenAI</option>
                <option value="google">Google</option>
                <option value="auto">Auto</option>
              </select>
            </div>
          </div>
          <div class="btn-group mt-8 mb-8">
            <button class="btn btn-primary btn-sm" id="proc-tab-ai" onclick="setProcessMode('ai')">🤖 AI Mode</button>
            <button class="btn btn-secondary btn-sm" id="proc-tab-model" onclick="setProcessMode('model')">⚙️ Model local</button>
          </div>
          <div style="display:none">
            <select id="proc-transcribe-provider-ai"><option value="groq" selected>Groq</option></select>
            <select id="proc-trans-provider-ai"><option value="9router">🔀 9Router</option><option value="deepseek" selected>DeepSeek</option><option value="groq">Groq</option><option value="openai">OpenAI</option><option value="google">Google</option><option value="auto">Auto</option></select>
          </div>
          <div id="proc-ai-panel" style="display:none"></div>
          <div id="proc-model-panel" style="display:none"></div>
        </div>
      </div>

      <!-- Subtitles - moved to top, full-width, see below -->
      <!-- Voice -->
      <div class="card card-collapsible collapsed">
        <div class="card-header" onclick="toggleCard(this)">
          <span class="card-title">🎙 Đổi giọng theo ngôn ngữ</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <label class="toggle-wrap">
              <input type="checkbox" class="toggle-input" id="proc-voice" checked>
              <div class="toggle"></div>
              <span class="toggle-label text-sm">Bật</span>
            </label>
          </div>
        </div>
        <div class="card-body">
          <div class="grid-2">
            <div class="field">
              <label>TTS Engine</label>
              <select id="proc-tts-engine" onchange="_syncVoiceOptions('proc-tts-engine','proc-tts-voice')">
                <option value="fpt-ai" selected>FPT AI TTS</option>
                <option value="edge-tts">Edge TTS (Microsoft)</option>
                <option value="elevenlabs">ElevenLabs TTS</option>
                <option value="minimax">MiniMax TTS</option>
                <option value="gtts">gTTS (Google)</option>
              </select>
            </div>
            <div class="field">
              <label>Giọng đọc</label>
              <select id="proc-tts-voice"></select>
            </div>
            <div class="field">
              <label>Cao độ</label>
              <input type="text" id="proc-tts-pitch" placeholder="+0Hz" value="+0Hz">
            </div>
            <div class="field">
              <label>Tốc độ đọc</label>
              <input type="text" id="proc-tts-rate" placeholder="+0%" value="+0%">
            </div>
            <div class="field">
              <label>Cảm xúc</label>
              <select id="proc-tts-emotion">
                <option value="default" selected>Mặc định</option>
                <option value="cheerful">Vui vẻ</option>
                <option value="sad">Buồn</option>
                <option value="angry">Giận dữ</option>
                <option value="excited">Hào hứng</option>
                <option value="friendly">Thân thiện</option>
              </select>
            </div>
            <div class="field">
              <label>Tốc độ TTS</label>
              <div class="flex-center gap-8">
                <input type="range" id="proc-tts-speed" min="0.5" max="3.0" step="0.1" value="1.0"
                  oninput="document.getElementById('proc-tts-speed-val').textContent=parseFloat(this.value).toFixed(1)+'x'" style="flex:1">
                <span class="text-xs" id="proc-tts-speed-val" style="min-width:32px">1.0x</span>
              </div>
            </div>
          </div>
          <div class="check-grid mt-8">
            <label class="check-item"><input type="checkbox" id="proc-auto-speed" checked><span>Tự động tốc độ</span></label>
            <label class="check-item"><input type="checkbox" id="proc-keep-bg"><span>Giữ nhạc nền</span></label>
          </div>
          <div class="field mt-8">
            <label>Âm lượng nhạc nền</label>
            <div class="flex-center gap-8">
              <input type="range" id="proc-bg-vol" min="0" max="1" step="0.1" value="0.1"
                oninput="document.getElementById('proc-bg-vol-val').textContent=this.value" style="flex:1">
              <span class="text-xs text-muted" id="proc-bg-vol-val">0.1</span>
            </div>
          </div>
          <div class="flex-center gap-8 mt-8">
            <button class="btn btn-secondary btn-sm" onclick="previewProcessVoice()">▶ Nghe thử</button>
            <audio id="proc-preview-audio" controls style="display:none;height:32px;flex:1"></audio>
          </div>
          <!-- Voice FX -->
          <hr class="divider">
          <div class="flex-between mb-8">
            <span class="section-title" style="margin:0">🎚 Hiệu ứng giọng (FX)</span>
            <label class="toggle-wrap">
              <input type="checkbox" class="toggle-input" id="proc-fx-enabled">
              <div class="toggle"></div>
              <span class="toggle-label text-sm">Bật</span>
            </label>
          </div>
          <div class="grid-2">
            <div class="field"><label>Pitch (bán âm)</label><input type="number" id="proc-fx-pitch" step="0.1" value="1.5"></div>
            <div class="field"><label>Speed</label><input type="number" id="proc-fx-speed" step="0.01" value="1.08"></div>
          </div>
          <div class="grid-3 mt-8">
            <div class="field"><label>Bass (dB)</label><input type="number" id="proc-fx-bass" step="1" value="-2"></div>
            <div class="field"><label>Mid (dB)</label><input type="number" id="proc-fx-mid" step="1" value="2"></div>
            <div class="field"><label>Treble (dB)</label><input type="number" id="proc-fx-treble" step="1" value="3"></div>
          </div>
          <div class="grid-2 mt-8">
            <div class="field">
              <label>Nén (Comp)</label>
              <select id="proc-fx-comp">
                <option value="none">Tắt</option>
                <option value="light" selected>Nhẹ</option>
                <option value="heavy">Mạnh</option>
              </select>
            </div>
            <div class="field"><label>Vang (Reverb %)</label><input type="number" id="proc-fx-reverb" min="0" max="100" value="5"></div>
          </div>
        </div>
      </div>
  </section><!-- /step 3 -->
