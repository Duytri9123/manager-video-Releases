<!-- ═════════════════ STEP 1: Nguồn video ═════════════════ -->
<section class="proc-step" data-proc-step="1">
  <div class="proc-step-head">
    <h2 class="proc-step-title">📥 Nguồn video</h2>
    <p class="proc-step-sub">Dán link video hoặc chọn file từ máy, rồi thêm vào hàng chờ. Tải video gốc tự động và chuẩn bị preview.</p>
  </div>

  <div class="proc-step5-grid">

  <!-- COL LEFT: Source input -->
  <div class="card card-collapsible">
    <div class="card-header" onclick="toggleCard(this)">
      <span class="card-title">📥 Nhập dữ liệu</span>
    </div>
    <div class="card-body">
      <div class="field">
        <label>Import file video</label>
        <div class="flex-center gap-8">
          <input type="text" id="proc-video" placeholder="./Downloaded/.../video.mp4" readonly style="flex:1">
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('proc-file').click()">📂 Chọn</button>
          <input type="file" id="proc-file" accept="video/*" style="display:none">
        </div>
        <div class="text-xs text-muted mt-4" id="proc-file-name">--</div>
      </div>
      <div class="field">
        <label>URL video (Tự động tải không logo)</label>
        <input type="text" id="proc-url" placeholder="https://www.douyin.com/video/...">
      </div>
      <div class="field">
        <label>Thư mục xuất (để trống = cùng thư mục video)</label>
        <input type="text" id="proc-out" placeholder="./output">
      </div>

      <label class="check-item mt-8" style="width:100%" title="Khi bật: tải xong sẽ bỏ qua bước 2 Xem &amp; Chỉnh sửa, tự động chạy tạo SRT/ASS/Giọng lồng tiếng ở bước 3, dừng lại ở bước 3 để check ASS &amp; Thumbnail rồi tiếp tục chạy xử lý ở bước 4.">
        <input type="checkbox" id="proc-auto-flow">
        <span>🔁 Tự động hóa quy trình (Tải xong → Dịch &amp; Lồng tiếng → Check ASS/Thumb → Xử lý)</span>
      </label>

      <!-- Skip options — apply when processing starts -->
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px">
        <label class="check-item" style="width:auto;white-space:nowrap" title="Tự động bỏ qua bước kiểm tra và chỉnh sửa phụ đề ASS">
          <input type="checkbox" id="step3-skip-ass" onchange="_onStep3SkipChange()">
          <span>⏭ Bỏ qua kiểm tra ASS</span>
        </label>
        <label class="check-item" style="width:auto;white-space:nowrap" title="Tự động bỏ qua bước chọn thumbnail">
          <input type="checkbox" id="step3-skip-thumb" onchange="_onStep3SkipChange()">
          <span>⏭ Bỏ qua thumbnail</span>
        </label>
      </div>

      <div class="btn-group mt-12">
        <button class="btn btn-primary" id="btn-proc" onclick="_addCurrentToQueue()">➕ Thêm vào hàng chờ</button>
      </div>
    </div>
  </div>

  <!-- COL RIGHT: Queue -->
  <div class="card card-collapsible">
    <div class="card-header" onclick="toggleCard(this)">
      <span class="card-title">📋 Hàng chờ tải &amp; xử lý (<span id="batch-count">0</span>)</span>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-danger btn-sm" onclick="window._batchQueue=[];_renderBatchQueue()">🗑 Xóa tất cả</button>
      </div>
    </div>
    <div class="card-body">
      <div id="batch-queue-list" style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:4px">
        <div class="empty-state text-xs">Chưa có video nào trong hàng chờ.</div>
      </div>

      <!-- Download trigger + log -->
      <div id="step1-download-area" style="display:none;margin-top:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <button class="btn btn-secondary btn-sm" id="btn-step1-download"
            onclick="window._step1Downloading=false;_runStep1QueueDownload()"
            style="white-space:nowrap">
            📥 Tải hàng chờ
          </button>
          <span class="text-xs text-muted" id="step1-dl-status">Nhấn để bắt đầu tải video gốc từ URL.</span>
        </div>
        <!-- Download log box -->
        <div id="step1-dl-log"
          style="max-height:160px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:11px;font-family:monospace;color:var(--text);display:none">
        </div>
      </div>

      <div class="btn-group mt-12" id="step1-next-btn-wrap" style="display:none">
        <button class="btn btn-primary w-full justify-center" style="font-weight:700"
          onclick="window.procWizStep2Continue && window.procWizStep2Continue()">
          ▶ Xử lý &amp; Xem kết quả (Bước 2) →
        </button>
      </div>
    </div>
  </div>

  </div><!-- /proc-step5-grid -->
</section><!-- /step 1 -->
