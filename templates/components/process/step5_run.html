<!-- ═════════════════ STEP 4: Xử lý & Theo dõi ═════════════════ -->
<section class="proc-step" data-proc-step="4" style="display:none">
  <div class="proc-step-head">
    <h2 class="proc-step-title">⚙️ Xử lý & Theo dõi</h2>
    <p class="proc-step-sub">Theo dõi tiến trình burn phụ đề/khung và nhật ký chi tiết bên dưới.</p>
  </div>

  <div class="proc-step5-grid">

    <!-- Progress -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">📊 Tiến trình</span>
        <div class="card-actions">
          <button class="btn btn-secondary btn-sm" id="btn-proc-pause" style="display:none" onclick="procTogglePause()">
            ⏸ Dừng
          </button>
        </div>
      </div>
      <div class="progress-row">
        <span class="progress-label">Tổng thể</span>
        <div class="progress-bar-wrap"><div class="progress-bar pb-overall" id="pb-proc-overall"></div></div>
        <span class="progress-pct" id="pb-proc-overall-pct">0%</span>
      </div>
      <div class="progress-info text-muted" id="lbl-proc-overall">--</div>
      
      <div id="proc-done-actions" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div class="btn-group" style="flex-direction:column;gap:8px">
          <button class="btn btn-primary w-full justify-center" style="font-weight:700"
            onclick="_procImportAndAICaption()">
            🤖 Import & AI viết Caption → Đăng (Bước 5)
          </button>
          <button class="btn btn-success w-full justify-center" onclick="sendLastProcessedToPublish()">
            👉 Chuyển sang Bước 5 (đã có caption) →
          </button>
        </div>
      </div>
    </div>

    <!-- Log -->
    <div class="card card-collapsible">
      <div class="card-header" onclick="toggleCard(this)">
        <span class="card-title">📝 Nhật ký</span>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-secondary btn-sm" onclick="clearLog('proc-log')">Xóa</button>
        </div>
      </div>
      <div class="card-body">
        <div class="log-box" id="proc-log" style="height:360px"></div>
      </div>
    </div>

  </div><!-- /step5-grid -->
</section><!-- /step 4 -->
