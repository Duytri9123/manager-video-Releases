  function procSaveDefaults() {
    const data = {};
    _PROC_FIELDS.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el) return;
      data[f.id] = f.type === 'checkbox' ? el.checked : el.value;
    });
    // Save blur mode radio
    const blurMode = document.querySelector('input[name="frame-blur-mode"]:checked')?.value;
    if (blurMode) data['frame-blur-mode'] = blurMode;

    try {
      const map = _loadPresetsMap();
      const aspect = window._procActiveAspect || '16x9';
      map[aspect] = data;
      _savePresetsMap(map);
      // Keep legacy v1 in sync with the most recently saved preset for backward compat
      try { localStorage.setItem(_PROC_DEFAULTS_KEY, JSON.stringify(data)); } catch (_) {}
      toast(`✅ Đã lưu cài đặt mặc định cho ${aspect.replace('x', ':')}`, 'success');
      _updateAspectBadge();
    } catch (e) {
      toast('Lỗi lưu: ' + e.message, 'error');
    }
  }

  function procRestoreDefaults() {
    try {
      const map = _loadPresetsMap();
      const aspect = window._procActiveAspect || '16x9';
      const data = map[aspect];
      if (!data) {
        toast(`Chưa có cài đặt mặc định cho tỉ lệ ${aspect.replace('x', ':')}`, 'warning');
        return;
      }
      _PROC_FIELDS.forEach(f => {
        const el = document.getElementById(f.id);
        if (!el || !(f.id in data)) return;
        if (f.type === 'checkbox') el.checked = data[f.id];
        else el.value = data[f.id];
        // Trigger change events for dependent UI
        el.dispatchEvent(new Event('change'));
        el.dispatchEvent(new Event('input'));
      });
      // Restore blur mode radio
      if (data['frame-blur-mode']) {
        const radio = document.querySelector(`input[name="frame-blur-mode"][value="${data['frame-blur-mode']}"]`);
        if (radio) { radio.checked = true; radio.dispatchEvent(new Event('change')); }
      }
      // Sync voice options after restore
      if (typeof _onTargetLangChange === 'function') {
        _onTargetLangChange();
      } else if (typeof _syncVoiceOptions === 'function') {
        _syncVoiceOptions('proc-tts-engine', 'proc-tts-voice');
      }
      // Sync frame controls visibility
      if (typeof frameToggle === 'function') frameToggle();
      // Sync preview aspect layout
      if (typeof _onPreviewAspectChange === 'function') _onPreviewAspectChange();
      toast(`✅ Đã khôi phục cài đặt cho tỉ lệ ${aspect.replace('x', ':')}`, 'success');
    } catch (e) {
      toast('Lỗi khôi phục: ' + e.message, 'error');
    }
  }

  // Auto-restore on page load
  document.addEventListener('DOMContentLoaded', () => {
    try {
      // Pick initial preset to apply on first load
      const map = _loadPresetsMap();
      // Check if saved preset has proc-preview-aspect
      const initialAspect = '16x9';
      window._procActiveAspect = initialAspect;
      const data = map[initialAspect] || map['9x16'];

      if (data) {
        _PROC_FIELDS.forEach(f => {
          const el = document.getElementById(f.id);
          if (!el || !(f.id in data)) return;
          if (f.type === 'checkbox') el.checked = data[f.id];
          else el.value = data[f.id];
        });
        // Restore blur mode radio (not in _PROC_FIELDS because it's a radio group)
        if (data['frame-blur-mode']) {
          const radio = document.querySelector(`input[name="frame-blur-mode"][value="${data['frame-blur-mode']}"]`);
          if (radio) radio.checked = true;
        }
        if (typeof _onTargetLangChange === 'function') {
          _onTargetLangChange();
        } else if (typeof _syncVoiceOptions === 'function') {
          _syncVoiceOptions('proc-tts-engine', 'proc-tts-voice');
        }
        if (typeof _syncColorPicker === 'function') _syncColorPicker();
      }
      _updateAspectBadge();
      // Sync frame controls visibility on page load
      if (typeof frameToggle === 'function') frameToggle();
      // Apply preview aspect on page load (reads from proc-preview-aspect select which was restored above)
      if (typeof _onPreviewAspectChange === 'function') _onPreviewAspectChange();
    } catch (_) {}
  });

  // ── Đổi khung hình Preview/Thumbnail (16:9, 9:16, hoặc auto) ───────────
  function _onPreviewAspectChange() {
    const sel = document.getElementById('proc-preview-aspect');
    const value = sel?.value || 'auto';

    // Resolve effective aspect:
    //  - 'auto' → dùng aspect của video frame đã load (nếu có), mặc định 16x9
    //  - '16x9' / '9x16' → ép buộc
    let aspect = value;
    if (value === 'auto') {
      const img = document.getElementById('sub-preview-img');
      if (img && img.naturalWidth && img.naturalHeight) {
        aspect = (img.naturalHeight > img.naturalWidth) ? '9x16' : '16x9';
      } else {
        aspect = '16x9';  // default fallback when no video loaded yet
      }
    }
    const isVertical = aspect === '9x16';

    const subWrap   = document.getElementById('sub-preview-wrap');
    const thumbWrap = document.getElementById('thumb-preview-wrap');

    // Khung xem trước LUÔN theo tỉ lệ video GỐC (mục tiêu: chỉnh sửa trên video gốc).
    // "Chế độ video" (16:9 / 9:16) chỉ là tỉ lệ ĐÍCH để scale/xoay khi XUẤT, không
    // làm méo khung preview ở bước chỉnh sửa.
    const _imgEl = document.getElementById('sub-preview-img');
    let origAspect = '16 / 9';
    if (_imgEl && _imgEl.naturalWidth && _imgEl.naturalHeight) {
      origAspect = _imgEl.naturalWidth + ' / ' + _imgEl.naturalHeight;
    }
    if (subWrap)   subWrap.style.aspectRatio   = origAspect;
    // Thumbnail là ảnh cho nền tảng đăng → giữ theo tỉ lệ đích.
    if (thumbWrap) thumbWrap.style.aspectRatio = isVertical ? '9 / 16' : '16 / 9';

    // Sync với window._procActiveAspect để các logic khác dùng
    window._procActiveAspect = aspect;
    if (typeof _updateAspectBadge === 'function') _updateAspectBadge();

    // Re-render preview overlays
    if (typeof _renderSubOverlay === 'function') _renderSubOverlay();
    if (typeof framePreviewUpdate === 'function') framePreviewUpdate();
  }

  function frameToggle() {
    const enabled = document.getElementById('frame-enabled')?.checked;
    const controls = document.getElementById('frame-controls');
    if (controls) controls.style.display = enabled ? 'block' : 'none';

    const img    = document.getElementById('sub-preview-img');
    const canvas = document.getElementById('frame-preview-canvas');
    const blurC  = document.getElementById('sub-preview-blur-canvas');
    const blurD  = document.getElementById('sub-preview-blur');
    const text   = document.getElementById('sub-preview-text');

    if (enabled) {
      // Frame mode: hide subtitle DOM overlays (subtitle drawn on canvas instead)
      if (blurC)  blurC.style.display  = 'none';
      if (blurD)  blurD.style.display  = 'none';
      if (text)   text.style.display   = 'none';
      if (canvas) canvas.style.display = 'block';
      // Bỏ các div vùng che DOM còn sót (đã thêm ở chế độ phụ đề) để không bị
      // hiển thị 2 lớp với vùng che vẽ trên canvas khung.
      const _w = document.getElementById('sub-preview-wrap');
      if (_w) _w.querySelectorAll('.extra-blur-zone').forEach(el => el.remove());
      window._pe2Sel = null;
      // Keep img rendered but invisible (needed for naturalWidth/drawImage)
      if (img && img.src && img.naturalWidth) {
        img.style.display = 'block';
        img.style.position = 'absolute';
        img.style.opacity = '0';
        img.style.pointerEvents = 'none';
      }
      framePreviewUpdate();
    } else {
      // Subtitle mode: hide frame canvas, show img + overlays
      if (canvas) canvas.style.display = 'none';
      if (img && img.src && img.src !== window.location.href) {
        img.style.display = 'block';
        img.style.position = '';
        img.style.opacity = '';
        img.style.pointerEvents = '';
        // Trả lại tỉ lệ khung theo video (bỏ tỉ lệ do khung video áp vào)
        if (typeof _onPreviewAspectChange === 'function') _onPreviewAspectChange();
        _renderSubOverlay();
      }
    }
  }

  // Auto-update frame preview when frame-enabled toggled
  document.addEventListener('DOMContentLoaded', () => {
    // frame-enabled change is handled by inline onchange="frameToggle()"
    const blurChk = document.getElementById('proc-blur-original');
    if (blurChk) blurChk.addEventListener('change', () => _renderSubOverlay());
    const burnChk2 = document.getElementById('proc-burn');
    if (burnChk2) burnChk2.addEventListener('change', () => _renderSubOverlay());
    const burnViChk2 = document.getElementById('proc-burn-vi');
    if (burnViChk2) burnViChk2.addEventListener('change', () => _renderSubOverlay());
  });

  // ── Thumbnail preview (chỉ hiển thị, không lưu file) ─────────────────────
  async function generateThumbnailPreview() {
    const source = _getPreviewVideoPath();
    if (!source) {
      toast('Chưa có video — hãy chọn file hoặc nhập URL', 'warning');
      return;
    }

    const ts = parseFloat(document.getElementById('sub-preview-ts')?.value || 2);

    const img = document.getElementById('thumb-preview-img');
    const ph  = document.getElementById('thumb-placeholder');
    const info = document.getElementById('thumb-output-info');
    const btn = document.querySelector('[onclick="generateThumbnailPreview()"]');

    if (btn) { btn.disabled = true; btn.textContent = '⏳...'; }
    if (ph) { ph.style.display = 'block'; ph.textContent = 'Đang lấy preview...'; }
    if (img) img.style.display = 'none';
    if (info) info.style.display = 'none';

    try {
      let res, data;

      if (source.type === 'file') {
        // Chỉ lấy frame preview (không tạo file thumbnail)
        res = await fetch('/api/video_frame', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ video_path: source.val, timestamp: ts }),
        });
        data = await res.json();
      } else {
        // URL — lấy cover từ URL
        res = await fetch('/api/video_frame_from_url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: source.val }),
        });
        data = await res.json();
      }

      if (data.ok && data.image) {
        if (img) {
          img.src = data.image;
          img.style.display = 'block';
        }
        if (ph) ph.style.display = 'none';
        // Save state — frame mode means: server will extract frame at runtime, no path needed
        window._thumbState = { mode: 'frame', path: '', b64: data.image };
        toast('✓ Preview thumbnail', 'success');
      } else {
        if (ph) { ph.style.display = 'block'; ph.textContent = data.error || 'Không lấy được frame'; }
        toast('Lỗi: ' + (data.error || ''), 'error');
      }
    } catch (e) {
      if (ph) { ph.style.display = 'block'; ph.textContent = 'Lỗi: ' + e.message; }
      toast('Lỗi: ' + e.message, 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '🎨'; }
    }
  }

  // ── Thumbnail helpers: Import / Clear / Toggle / Source tracking ─────────
  // window._thumbState: { mode: 'import'|'ai'|'frame'|'none', path: string, b64: string }
  window._thumbState = { mode: 'none', path: '', b64: '' };

  // ── Multiple blur zones ────────────────────────────────────────────────────
  window._procExtraBlurZones = [];
  let _blurZoneCounter = 0;

  function procAddBlurZone() {
    _blurZoneCounter++;
    const id = _blurZoneCounter;
    window._procExtraBlurZones.push({ id, height: 12, position: 50, width: 80, x: 50, start: '', end: '', zone: 'custom' });
    _renderExtraBlurZones();
    subPreviewUpdate();
  }

  function procRemoveBlurZone(id) {
    window._procExtraBlurZones = window._procExtraBlurZones.filter(z => z.id !== id);
    _renderExtraBlurZones();
    subPreviewUpdate();
  }

  function _renderExtraBlurZones() {
    const container = document.getElementById('proc-blur-extra-list');
    if (!container) return;
    container.innerHTML = window._procExtraBlurZones.map(z => {
      var st = (z.start === '' || z.start == null) ? '' : z.start;
      var en = (z.end === '' || z.end == null) ? '' : z.end;
      var rangeTxt = '⏱ Burn ' + (st !== '' ? ('từ ' + st + 's') : 'từ đầu') + ' ' + (en !== '' ? ('đến ' + en + 's') : 'đến cuối');
      return `
      <div style="border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px" data-blur-id="${z.id}">
        <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px">
          <div class="field"><label>Cao %</label><input type="number" value="${z.height}" min="3" max="40" step="1" style="height:36px" onchange="procUpdateBlurZone(${z.id},'height',this.value)" oninput="subPreviewUpdate()"></div>
          <div class="field"><label>Y %</label><input type="number" value="${z.position}" min="0" max="100" step="1" style="height:36px" onchange="procUpdateBlurZone(${z.id},'position',this.value)" oninput="subPreviewUpdate()"></div>
          <div class="field"><label>X %</label><input type="number" value="${z.x ?? 50}" min="0" max="100" step="1" style="height:36px" onchange="procUpdateBlurZone(${z.id},'x',this.value)" oninput="subPreviewUpdate()"></div>
          <div class="field"><label>Rộng %</label><input type="number" value="${z.width ?? 80}" min="20" max="100" step="5" style="height:36px" onchange="procUpdateBlurZone(${z.id},'width',this.value)" oninput="subPreviewUpdate()"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:end;margin-top:6px">
          <div class="field"><label>Từ (s)</label><input type="number" value="${st}" min="0" step="0.5" placeholder="đầu" style="height:36px" onchange="procUpdateBlurZone(${z.id},'start',this.value)"></div>
          <div class="field"><label>Đến (s)</label><input type="number" value="${en}" min="0" step="0.5" placeholder="cuối" style="height:36px" onchange="procUpdateBlurZone(${z.id},'end',this.value)"></div>
          <button class="btn btn-secondary btn-sm" style="height:36px;padding:0 10px;font-size:14px" onclick="procRemoveBlurZone(${z.id})" title="Xóa vùng che">🗑</button>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:5px">${rangeTxt}</div>
      </div>`;
    }).join('');
    if (window.pe2RenderRanges) window.pe2RenderRanges();
  }

  function procUpdateBlurZone(id, key, val) {
    const zone = window._procExtraBlurZones.find(z => z.id === id);
    if (!zone) return;
    if (key === 'start' || key === 'end') {
      zone[key] = (val === '' || val === null || val === undefined) ? '' : (parseFloat(val) || 0);
      _renderExtraBlurZones();   // cập nhật dòng "Burn từ … đến …"
    } else {
      zone[key] = parseFloat(val) || 0;
    }
  }


  function thumbImportFile(input) {
    const file = input.files?.[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      toast('Chỉ hỗ trợ file ảnh', 'error');
      return;
    }
    // Upload file to server
    const fd = new FormData();
    fd.append('file', file);
    fd.append('type', 'thumbnail');
    fetch('/api/upload_anti_fp_image', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(data => {
        if (data.ok && data.path) {
          window._thumbState = { mode: 'import', path: data.path, b64: '' };
          // Show preview from local FileReader
          const reader = new FileReader();
          reader.onload = e => {
            const img = document.getElementById('thumb-preview-img');
            const ph  = document.getElementById('thumb-placeholder');
            const info = document.getElementById('thumb-output-info');
            if (img) { img.src = e.target.result; img.style.display = 'block'; }
            if (ph) ph.style.display = 'none';
            if (info) { info.style.display = 'block'; info.textContent = '📁 ' + data.path; }
          };
          reader.readAsDataURL(file);
          toast('✓ Đã import thumbnail', 'success');
        } else {
          toast('Lỗi upload: ' + (data.error || ''), 'error');
        }
      })
      .catch(e => toast('Lỗi: ' + e.message, 'error'))
      .finally(() => { input.value = ''; });
  }

  function thumbClear() {
    const img = document.getElementById('thumb-preview-img');
    const ph  = document.getElementById('thumb-placeholder');
    const info = document.getElementById('thumb-output-info');
    if (img) { img.src = ''; img.style.display = 'none'; }
    if (ph) { ph.style.display = 'block'; ph.textContent = '📁 Import / 🎨 Tạo / 🤖 AI'; }
    if (info) info.style.display = 'none';
    window._thumbState = { mode: 'none', path: '', b64: '' };
    toast('Đã xóa thumbnail', 'info');
  }

  function thumbToggleEnabled() {
    const enabled = document.getElementById('thumb-enabled')?.checked;
    const wrap = document.getElementById('thumb-preview-wrap');
    if (wrap) wrap.style.opacity = enabled ? '1' : '0.4';
    if (!enabled) {
      toast('Đã tắt thumbnail (sẽ không chèn vào video)', 'info');
    }
  }


  async function generateThumbnailAI() {
    const source = _getPreviewVideoPath();
    const ts = parseFloat(document.getElementById('sub-preview-ts')?.value || 2);
    const title = document.getElementById('thumb-title')?.value?.trim() || '';
    let sample = document.getElementById('sub-preview-sample')?.value?.trim() || '';
    if (sample === 'Đây là phụ đề tiếng Việt mẫu') {
      sample = ''; // Bỏ qua phụ đề mẫu mặc định để tránh làm nhiễu AI
    }

    // Ưu tiên 1: Lấy ảnh đang có sẵn ở Thumbnail để chỉnh sửa / vẽ tiếp lên chính nó
    const existingThumbImg = document.getElementById('thumb-preview-img');
    const previewImg = document.getElementById('sub-preview-img');
    
    let frameB64 = null;
    let isEditingExistingThumb = false;

    if (existingThumbImg && existingThumbImg.src && existingThumbImg.src.startsWith('data:image/')) {
      // Chỉnh sửa thumbnail hiện tại: dùng chính thumbnail đó làm ảnh tham chiếu
      const parts = existingThumbImg.src.split(',');
      if (parts.length > 1) {
        frameB64 = parts[1];
        isEditingExistingThumb = true;
      }
    }
    // Ưu tiên 2: Tạo mới — luôn dùng ảnh frame gốc (không có logo) từ window._rawFrameB64
    else if (window._rawFrameB64) {
      frameB64 = window._rawFrameB64;
    }
    // Fallback cuối: lấy từ src của sub-preview-img (trường hợp không có _rawFrameB64)
    else if (previewImg && previewImg.src && previewImg.src.startsWith('data:image/')) {
      const parts = previewImg.src.split(',');
      if (parts.length > 1) {
        frameB64 = parts[1];
      }
    }

    // Bắt buộc phải có ảnh tham chiếu khi bấm tạo bằng nút AI ở Thumbnail
    if (!frameB64) {
      toast('⚠️ Vui lòng lấy frame Preview hoặc import/tạo sẵn 1 thumbnail trước để AI có ảnh làm dữ liệu tham chiếu!', 'warning');
      return;
    }

    const img = document.getElementById('thumb-preview-img');
    const ph  = document.getElementById('thumb-placeholder');
    const info = document.getElementById('thumb-output-info');
    const btn = document.querySelector('[onclick="generateThumbnailAI()"]');

    const loadingMsg = isEditingExistingThumb
      ? '✏️ AI đang chỉnh sửa thumbnail hiện tại...'
      : '🤖 AI đang phân tích video và tạo thumbnail...';
    const btnLabel  = isEditingExistingThumb ? '⏳ AI đang sửa...' : '⏳ AI đang tạo...';

    if (btn) { btn.disabled = true; btn.textContent = btnLabel; }
    if (ph) { ph.style.display = 'block'; ph.textContent = loadingMsg; }
    if (img) img.style.display = 'none';
    if (info) info.style.display = 'none';

    try {
      const body = {
        timestamp: ts,
        title: title,
        subtitle_text: sample,
        style: 'youtube',
        aspect_ratio: '9:16',
        frame_b64: frameB64,
        is_editing_existing_thumb: isEditingExistingThumb,
      };

      // Add video_path if source is file
      if (source && source.type === 'file') {
        body.video_path = source.val;
      }

      const res = await fetch('/api/generate_thumbnail_ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.ok && data.image) {
        if (img) {
          img.src = data.image;
          img.style.display = 'block';
        }
        if (ph) ph.style.display = 'none';
        if (info) {
          info.style.display = 'block';
          let infoText = '';
          if (data.output_path) infoText += '📁 ' + data.output_path;
          if (data.prompt_used) infoText += '\n💡 Prompt: ' + data.prompt_used;
          info.textContent = infoText;
        }
        // Save state for batch processing
        window._thumbState = {
          mode: 'ai',
          path: data.output_path || '',
          b64: data.image || ''
        };
        const successMsg = isEditingExistingThumb
          ? '✓ AI đã chỉnh sửa thumbnail thành công!'
          : '✓ AI đã tạo thumbnail mới!';
        toast(successMsg, 'success');
      } else {
        if (ph) { ph.style.display = 'block'; ph.textContent = data.error || 'AI thumbnail thất bại'; }
        toast('Lỗi AI thumbnail: ' + (data.error || ''), 'error');
      }
    } catch (e) {
      if (ph) { ph.style.display = 'block'; ph.textContent = 'Lỗi: ' + e.message; }
      toast('Lỗi: ' + e.message, 'error');
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = '🤖'; }
    }
  }

  // Listen for thumbnail_path in NDJSON stream from /api/process_video
  // (Auto-display when pipeline finishes generating thumbnail)
  window._displayProcThumbnail = function(thumbPath, thumbImage) {
    const img = document.getElementById('thumb-preview-img');
    const ph  = document.getElementById('thumb-placeholder');
    const info = document.getElementById('thumb-output-info');
    if (img && thumbImage) {
      img.src = thumbImage;
      img.style.display = 'block';
    }
    if (ph) {
      if (thumbImage) {
        ph.style.display = 'none';
      } else {
        ph.style.display = 'block';
        ph.textContent = 'Thumbnail đã tạo: ' + (thumbPath || '').split(/[\\/]/).pop();
      }
    }
    if (info && thumbPath) {
      info.style.display = 'block';
      info.textContent = '📁 ' + thumbPath;
    }
  };
  </script>
