<!-- PAGE: TRANSCRIBE -->
<div id="page-transcribe" class="page">
  <style>
    /* Custom styles for transcription page */
    .tr-sub-row {
      display: grid;
      grid-template-columns: 45px 95px 95px 1fr 65px;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }
    .tr-sub-row:hover {
      background: rgba(var(--accent-rgb, 99, 102, 241), 0.04);
    }
    .tr-sub-row:last-child {
      border-bottom: none;
    }
    .tr-sub-index {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 11px;
      text-align: center;
    }
    .tr-sub-time-input {
      font-family: monospace;
      font-size: 11px;
      padding: 5px 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg3);
      color: var(--text);
      text-align: center;
    }
    .tr-sub-text-input {
      font-size: 12px;
      padding: 5px 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg3);
      color: var(--text);
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
      min-height: 28px;
      line-height: 1.3;
    }
    .tr-sub-text-input:focus, .tr-sub-time-input:focus {
      border-color: var(--accent);
      outline: none;
    }
    .tr-sub-editor-header {
      display: grid;
      grid-template-columns: 45px 95px 95px 1fr 65px;
      gap: 10px;
      padding: 6px 12px;
      background: var(--bg2);
      border-bottom: 1.5px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tr-sub-editor-list {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 380px;
    }
  </style>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    
    <!-- LEFT COLUMN: Config (span 1) -->
    <div class="flex flex-col gap-6">
      
      <!-- Card 1: Chọn Tệp & Phiên âm -->
      <div class="card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-5">
        <div class="flex items-center gap-2 mb-4 pb-2.5 border-b border-slate-100 dark:border-slate-700">
          <span class="text-lg">🎙️</span>
          <h3 class="text-xs font-bold text-slate-800 dark:text-slate-100 uppercase tracking-wider">Phiên âm video / audio</h3>
        </div>
        
        <div class="flex flex-col gap-3.5">
          <!-- File selection -->
          <div class="field mb-0">
            <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Tệp tin nguồn (Video/Audio/.ass)</label>
            <div class="flex gap-2">
              <input type="text" id="tr-file" placeholder="Đường dẫn file hoặc nhấn Chọn..." class="flex-1 text-xs">
              <button class="btn btn-secondary btn-sm px-3" onclick="document.getElementById('tr-import-file').click()">📂</button>
              <input type="file" id="tr-import-file" accept="video/*,audio/*,.ass" style="display:none" onchange="trOnFilePicked(this)">
            </div>
            <div class="text-[11px] text-slate-400 mt-1 italic" id="tr-file-name">Chưa chọn tệp</div>
          </div>
          
          <!-- Out dir -->
          <div class="field mb-0">
            <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Thư mục xuất</label>
            <input type="text" id="tr-out" placeholder="Mặc định: cùng thư mục file nguồn" class="w-full text-xs">
          </div>

          <!-- Whisper configuration -->
          <div class="grid grid-cols-2 gap-3">
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Whisper Engine</label>
              <select id="tr-provider" class="w-full text-xs">
                <option value="groq" selected>Groq API (Nhanh)</option>
                <option value="model">Whisper Local</option>
              </select>
            </div>
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Ngôn ngữ gốc</label>
              <select id="tr-lang" class="w-full text-xs">
                <option value="zh" selected>Tiếng Trung</option>
                <option value="en">Tiếng Anh</option>
                <option value="ja">Tiếng Nhật</option>
                <option value="ko">Tiếng Hàn</option>
                <option value="vi">Tiếng Việt</option>
              </select>
            </div>
          </div>
          
          <div class="field mb-0" id="tr-model-row" style="display:none">
            <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Mô hình local</label>
            <select id="tr-model" class="w-full text-xs">
              <option value="base" selected>Base (Nhẹ nhất)</option>
              <option value="small">Small (Trung bình)</option>
              <option value="medium">Medium (Tốt)</option>
              <option value="large-v3">Large V3 (Chính xác)</option>
            </select>
          </div>

          <!-- Options -->
          <div class="flex flex-wrap gap-4 my-1">
            <label class="check-item flex items-center gap-1.5 cursor-pointer text-xs">
              <input type="checkbox" id="tr-srt" checked class="accent-indigo-500">
              <span>Xuất file phụ đề (.srt)</span>
            </label>
            <label class="check-item flex items-center gap-1.5 cursor-pointer text-xs">
              <input type="checkbox" id="tr-sc" class="accent-indigo-500">
              <span>Chuyển Phồn → Giản</span>
            </label>
          </div>

          <!-- Action buttons -->
          <div class="flex gap-2 mt-2">
            <button class="btn btn-primary flex-1 py-2 font-semibold text-xs flex justify-center items-center gap-1.5" id="btn-tr" onclick="trStartTranscribe()">
              <span>🚀 Bắt đầu phiên âm</span>
            </button>
            <button class="btn btn-secondary py-2 text-xs flex justify-center items-center gap-1.5" onclick="trExtractAudio()" title="Chỉ tách lấy nhạc MP3 từ video">
              <span>🎵 Tách MP3</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Card 2: Cấu hình Lồng tiếng (TTS) -->
      <div class="card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-5">
        <div class="flex items-center gap-2 mb-4 pb-2.5 border-b border-slate-100 dark:border-slate-700">
          <span class="text-lg">🔊</span>
          <h3 class="text-xs font-bold text-slate-800 dark:text-slate-100 uppercase tracking-wider">Cấu hình lồng tiếng (TTS)</h3>
        </div>
        
        <div class="flex flex-col gap-3.5">
          <div class="grid grid-cols-2 gap-3">
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Engine TTS</label>
              <select id="tr-tts-engine" class="w-full text-xs" onchange="trSyncVoiceOptions()">
                <option value="vieneu" selected>VieNeu local</option>
                <option value="edge-tts">Microsoft Edge</option>
                <option value="gtts">Google gTTS</option>
                <option value="fpt-ai">FPT AI</option>
                <option value="elevenlabs">ElevenLabs</option>
                <option value="fish-audio">Fish Audio</option>
              </select>
            </div>
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Ngôn ngữ lồng</label>
              <select id="tr-tts-lang" class="w-full text-xs" onchange="trSyncVoiceOptions()">
                <option value="vi" selected>Tiếng Việt</option>
                <option value="en">Tiếng Anh</option>
                <option value="zh">Tiếng Trung</option>
                <option value="ja">Tiếng Nhật</option>
                <option value="ko">Tiếng Hàn</option>
                <option value="fr">Tiếng Pháp</option>
                <option value="de">Tiếng Đức</option>
                <option value="es">Tiếng Tây Ban Nha</option>
                <option value="ru">Tiếng Nga</option>
                <option value="th">Tiếng Thái</option>
                <option value="id">Tiếng Indonesia</option>
                <option value="it">Tiếng Ý</option>
                <option value="pt">Tiếng Bồ Đào Nha</option>
              </select>
            </div>
          </div>

          <!-- Dynamic 9Router fields (shown only when selected 9router engine) -->
          <div id="tr-9r-fields" class="grid grid-cols-1 gap-3" style="display:none">
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Mô hình 9Router</label>
              <select id="tr-9r-model" class="w-full text-xs" onchange="trSync9RouterVoices()"></select>
            </div>
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">9Router API Key</label>
              <div class="flex items-center gap-2">
                <input type="text" id="tr-9r-api-key" readonly class="w-full text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg p-2" placeholder="Thiếu API Key 9Router - Vui lòng cấu hình ở Cài đặt" style="flex:1">
              </div>
              <span id="tr-9r-api-key-status" class="text-[10px] mt-1 block"></span>
            </div>
          </div>

          <div class="field mb-0">
            <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Giọng đọc</label>
            <select id="tr-tts-voice" class="w-full text-xs"></select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Tốc độ đọc</label>
              <input type="text" id="tr-tts-rate" value="+0%" placeholder="+0%" class="w-full text-xs">
            </div>
            <div class="field mb-0">
              <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Cao độ</label>
              <input type="text" id="tr-tts-pitch" value="+0Hz" placeholder="+0Hz" class="w-full text-xs">
            </div>
          </div>
          
          <div class="field mb-0">
            <label class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 block">Thử giọng nói</label>
            <textarea id="tr-preview-text" placeholder="Nhập văn bản thử giọng..." class="w-full text-xs min-h-[50px] p-2 border border-slate-200 dark:border-slate-700 rounded-lg" rows="2"></textarea>
            <div class="flex flex-col gap-2 mt-2">
              <button class="btn btn-secondary text-[11px] py-2 w-full" onclick="trPreviewVoice()">▶ Nghe thử giọng</button>
              <audio id="tr-preview-audio" class="hidden w-full mt-1" controls style="outline: none;"></audio>
            </div>
          </div>

          <button class="btn btn-primary w-full py-2 font-semibold text-xs flex justify-center items-center gap-1.5 mt-1" onclick="trRunTtsFromAss()">
            <span>🔊 Lồng tiếng &amp; Xuất MP3</span>
          </button>
        </div>
      </div>
    </div>
    
    <!-- RIGHT COLUMN: Subtitle Editor & Logs (span 2) -->
    <div class="xl:col-span-2 flex flex-col gap-6">
      
      <!-- Card 3: Biên tập phụ đề -->
      <div class="card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-5 flex-1 flex flex-col min-h-[500px]">
        <div class="flex justify-between items-center mb-4 pb-2.5 border-b border-slate-100 dark:border-slate-700">
          <div class="flex items-center gap-2">
            <span class="text-lg">📝</span>
            <h3 class="text-xs font-bold text-slate-800 dark:text-slate-100 uppercase tracking-wider">Biên tập phụ đề &amp; lồng tiếng</h3>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-secondary text-xs py-1.5 px-3 flex items-center gap-1" onclick="trLoadSubtitles()">
              <span>🔄 Tải phụ đề từ file nguồn</span>
            </button>
            <button class="btn btn-success text-xs py-1.5 px-3 flex items-center gap-1" onclick="trSaveSubtitles()">
              <span>💾 Lưu phụ đề</span>
            </button>
          </div>
        </div>

        <!-- Subtitles Editor Table -->
        <div class="flex-1 overflow-y-auto max-h-[460px] border border-slate-200 dark:border-slate-700 rounded-xl mb-2" id="tr-sub-editor-wrap">
          <div class="p-8 text-center text-slate-400 dark:text-slate-500 text-xs flex flex-col items-center justify-center gap-2 h-full">
            <span>📭 Chưa có phụ đề để hiển thị.</span>
            <span class="text-[11px] text-slate-400">Chọn tệp .ass đã có hoặc chạy Bắt đầu phiên âm.</span>
          </div>
        </div>
      </div>

      <!-- Card 4: Nhật ký & Tiến trình -->
      <div class="card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-5">
        <div class="flex justify-between items-center mb-3">
          <h3 class="text-xs font-bold text-slate-800 dark:text-slate-100 uppercase tracking-wider">Nhật ký hoạt động</h3>
          <button class="btn btn-secondary text-[10px] py-1 px-2.5" onclick="clearLog('tr-log')">Xoá log</button>
        </div>
        
        <!-- Progress bars -->
        <div class="grid grid-cols-2 gap-4 mb-3">
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="text-slate-500 dark:text-slate-400">Tổng thể</span>
              <span id="pb-tr-overall-pct" class="font-semibold text-indigo-500">0%</span>
            </div>
            <div class="w-full bg-slate-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
              <div id="pb-tr-overall" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div>
            </div>
            <div id="lbl-tr-overall" class="text-[10px] text-slate-400 mt-1 truncate">Chờ bắt đầu...</div>
          </div>
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="text-slate-500 dark:text-slate-400">Tiến trình tệp</span>
              <span id="pb-tr-file-pct" class="font-semibold text-indigo-500">0%</span>
            </div>
            <div class="w-full bg-slate-100 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
              <div id="pb-tr-file" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div>
            </div>
            <div id="lbl-tr-file" class="text-[10px] text-slate-400 mt-1 truncate">Chờ bắt đầu...</div>
          </div>
        </div>

        <div class="log-box text-xs font-mono bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-800 p-3.5 rounded-xl h-40 overflow-y-auto" id="tr-log"></div>
      </div>
      
    </div>
  </div>

  <script>
  function trOnFilePicked(input) {
    if (input.files && input.files[0]) {
      window._trSelectedFile = input.files[0];
      const label = document.getElementById('tr-file-name');
      const trFile = document.getElementById('tr-file');
      if (label) label.textContent = 'Đã chọn: ' + input.files[0].name;
      if (trFile) trFile.value = input.files[0].name;
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    // Sync provider → toggle hiển thị model selector
    const provEl = document.getElementById('tr-provider');
    const modelRow = document.getElementById('tr-model-row');
    function _trSyncProvider() {
      if (!modelRow || !provEl) return;
      modelRow.style.display = (provEl.value === 'model') ? '' : 'none';
    }
    provEl?.addEventListener('change', _trSyncProvider);
    _trSyncProvider();

    // Khi user gõ/sửa input path bằng tay → invalidate file đã chọn trước đó.
    document.getElementById('tr-file')?.addEventListener('input', function() {
      window._trSelectedFile = null;
      const label = document.getElementById('tr-file-name');
      if (label && !this.value.trim()) label.textContent = 'Chưa chọn tệp';
    });
  });
  </script>
</div>
