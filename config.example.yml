# DuyTris Downloader — example config (sao chép thành config.yml và điền giá trị thật)
# Mật khẩu/secret KHÔNG nên đặt trong file này. Hãy dùng biến môi trường:
#   FLASK_SECRET_KEY, WEBAPP_PASSWORD, NGROK_AUTHTOKEN, OPENAI_API_KEY,
#   GROQ_API_KEY, DEEPSEEK_API_KEY, HUGGINGFACE_TOKEN, FPT_TTS_API_KEY,
#   TIKTOK_CLIENT_KEY, TIKTOK_CLIENT_SECRET, FB_APP_ID, FB_APP_SECRET, TMDB_API_KEY.

auth:
  enabled: false
  cors_origins: []   # empty = local-only mặc định

path: ./Downloaded/
mode: [post]
number: { post: 1, like: 0, allmix: 0, mix: 0, music: 0, collect: 0, collectmix: 0 }
increase: { post: false, like: false, allmix: false, mix: false, music: false }

thread: 5
retry_times: 3
proxy: ''
database: true
database_path: dy_downloader.db

cookies: {}   # đặt trong .cookies.json (gitignored) hoặc qua UI

link:
  - https://www.douyin.com/user/MS4wLjABAAAA6O7EZyfDRYXxJrUTpf91K3tmB4rBROkAw-nYMfld8ss

progress:
  quiet_logs: true

browser_fallback:
  enabled: true
  headless: false
  max_scrolls: 240
  idle_rounds: 8
  wait_timeout_seconds: 600

ngrok:
  enabled: false
  authtoken: ''
  domain: ''
  bind_tls: true
  public_url: ''

# Proxy pool / 4G router rotation
proxies:
  enabled: false
  rotation: { mode: round_robin, per_request: false }
  health_check: { enabled: true, test_url: https://ifconfig.me/ip, timeout_sec: 8 }
  list: []

routers:
  enabled: false
  list: []
  cooldown_sec: 30

# Translation / TTS / Transcript
translation:
  preferred_provider: deepseek
  deepseek_key: ''
  groq_key: ''
  groq_model: llama-3.1-8b-instant
  hf_token: ''
  openai_key: ''
  naming_enabled: true

transcript:
  enabled: false
  api_key: ''
  api_key_env: OPENAI_API_KEY
  api_url: https://api.openai.com/v1/audio/transcriptions
  groq_api_key: ''
  groq_max_mb: 25
  groq_model: whisper-large-v3-turbo
  model: gpt-4o-mini-transcribe
  output_dir: ''
  response_formats: [txt, json]

video_process:
  enabled: false
  model: small
  language: zh
  fpt_api_key: ''   # đặt trong env FPT_TTS_API_KEY
  elevenlabs_api_key: ''   # env ELEVENLABS_API_KEY
  elevenlabs_voice_id: '21m00Tcm4TlvDq8ikWAM'
  fish_api_key: ''         # env FISH_API_KEY — Fish Audio (đa ngôn ngữ: ja, zh, ko, vi...)
  fish_model: 's2-pro'    # backbone: s2-pro (mới nhất) hoặc s1
  fish_reference_id: ''   # voice model ID từ fish.audio — để trống = giọng mặc định
  tts_engine: edge-tts
  tts_voice: vi-VN-HoaiMyNeural
  tts_concurrency: 4
  tts_retries: 2
  bg_volume: 0.15
  font_size: 18
  blur_height: 15

ytdlp:
  # Cookie cho tải/tìm video đa nền tảng (YouTube, TikTok, Instagram, Facebook...).
  # Cách 1 (khuyên dùng): yt-dlp tự đọc cookie từ trình duyệt đã đăng nhập.
  #   chrome | edge | firefox | brave | opera | vivaldi (để trống = tắt)
  cookies_from_browser: ''
  browser_profile: ''
  # Cách 2: file cookie Netscape (.txt) export bằng extension "Get cookies.txt".
  cookie_files:
    all: ''
    youtube: ''
    tiktok: ''
    instagram: ''
    facebook: ''

upload:
  auto_upload: false
  platform: tiktok
  tiktok:
    title_template: '{title}'
    caption_template: '{title}'
    privacy_status: private
    scopes: [user.info.basic, video.publish]
    client_key: ''
    client_secret: ''
    redirect_uri: http://localhost:5000/api/tiktok/callback
  youtube:
    title_template: '{title}'
    description_template: '{title}'
    privacy_status: private
    short: true

facebook:
  app_id: ''
  app_secret: ''

# Movie review (TMDb)
movie:
  tmdb_api_key: ''        # v3 API key (TMDB Settings → API → API Key)
  tmdb_read_token: ''     # v4 Read Access Token (TMDB Settings → API → API Read Access Token)
  default_language: vi
  default_provider: deepseek
  cache_ttl_hours: 24
  default_template: cinematic

# Novel / Comic → Video
storywriter:
  default_provider: deepseek
  default_target_lang: vi
  chunk: { target_chars_per_segment: 350, max_chars_per_segment: 600, overlap_sentences: 0 }
  comic: { ocr_enabled: false, ocr_provider: tesseract }
  output_dir: ./Downloaded/scripts

# Gemini Video Generation (Veo 2)
gemini_video:
  api_key: ''           # hoặc env GEMINI_API_KEY
  model: veo-2.0-generate-001
  aspect_ratio: '16:9'
  duration: '8'

# 9Router — local AI gateway (OpenAI-compatible)
nine_router:
  endpoint: http://localhost:20128/v1
  api_key: ''           # sk-{machineId}-{keyId}-{crc8}
  default_model: duytris
  system_prompt: ''
  temperature: 0.7
  max_tokens: 4096

# Idea → Video pipeline (ViMax architecture)
# Dùng LLM (9Router/DeepSeek/OpenAI/Groq) + Gemini Veo 2 để tạo video từ ý tưởng
idea2video:
  output_dir: ./Downloaded/idea2video
  default_style: 'cinematic, high quality, dramatic lighting'
  shot_duration: 5      # giây mỗi shot (Gemini Veo 2)
  max_shots_per_scene: 8

# n8n orchestration — toolvideo là "worker", n8n là "conductor"
# n8n (lịch/webhook/đăng bài/thông báo) ──HTTP──▶ toolvideo REST API
n8n:
  enabled: false
  base_url: http://localhost:5678   # URL instance n8n
  api_key: ''                       # n8n REST API key (env N8N_API_KEY) — chỉ cần để liệt kê workflow
  webhook_url: ''                   # Production webhook URL để trigger
  timeout_sec: 30
