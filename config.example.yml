link:
  - https://www.douyin.com/user/MS4wLjABAAAA6O7EZyfDRYXxJrUTpf91K3tmB4rBROkAw-nYMfld8ss

path: ./Downloaded/

music: false
cover: false
avatar: false
json: false

start_time: ""
end_time: ""

folderstyle: false

mode:
  - post

number:
  post: 1
  like: 0
  allmix: 0
  mix: 0
  music: 0
  collect: 0
  collectmix: 0

increase:
  post: false
  like: false
  allmix: false
  mix: false
  music: false

thread: 5
rate_limit: 5
retry_times: 3
proxy: ""
database: true
database_path: dy_downloader.db

progress:
  quiet_logs: true

transcript:
  enabled: false
  model: gpt-4o-mini-transcribe
  groq_api_key: ""
  groq_model: whisper-large-v3-turbo
  groq_max_mb: 25
  output_dir: ""
  response_formats:
    - txt
    - json
  api_url: https://api.openai.com/v1/audio/transcriptions
  api_key_env: OPENAI_API_KEY
  api_key: ""

translation:
  deepseek_key: ""
  openai_key: ""
  hf_token: ""
  preferred_provider: deepseek

upload:
  platform: youtube
  auto_upload: false
  youtube:
    title_template: "{title}"
    description_template: "{title}"
    privacy_status: private
    short: false
  tiktok:
    title_template: "{title}"
    caption_template: "{title}"
    privacy_status: private
    scopes:
      - user.info.basic
      - video.publish
    client_key: ""
    client_secret: ""
    client_key_env: TIKTOK_CLIENT_KEY
    client_secret_env: TIKTOK_CLIENT_SECRET
    redirect_uri: ""

ngrok:
  enabled: false
  authtoken: ""
  domain: ""
  bind_tls: true
  public_url: ""

browser_fallback:
  enabled: true
  headless: false
  max_scrolls: 240
  idle_rounds: 8
  wait_timeout_seconds: 600

video_process:
  enabled: true
  model: small
  language: zh
  burn_subs: true
  blur_original: true
  translate: true
  burn_vi_subs: true
  voice_convert: true
  keep_bg_music: true
  keep_bg: true
  blur_zone: bottom
  tts_voice: banmai
  tts_engine: fpt-ai
  fpt_api_key: ssMeU5l89LMLfg8jhDzTBWV7D22s1xOy
  bg_volume: 0.15
  font_size: 18
  blur_height: 15

# CapCut Integration - Tự động import video và subtitle vào CapCut
capcut:
  enabled: false           # Bật/tắt tính năng CapCut
  auto_import: false       # Tự động import sau khi xử lý video
  capcut_path: ""          # Đường dẫn CapCut (để trống để tự động tìm)
  auto_open: false         # Tự động mở CapCut sau khi import

cookies:
  msToken: YOUR_MS_TOKEN
  ttwid: YOUR_TTWID
  odin_tt: YOUR_ODIN_TT
  passport_csrf_token: YOUR_CSRF_TOKEN
  sid_guard: YOUR_SID_GUARD

# Facebook Integration — cấu hình App ID + Secret để token tự động gia hạn
# Tạo app tại: https://developers.facebook.com/apps/
# Không cần cấu hình nếu bạn chỉ dùng token thủ công (hết hạn sau 60 ngày)
facebook:
  app_id: ""        # App ID từ Facebook Developers
  app_secret: ""    # App Secret từ Facebook Developers (giữ bí mật)
