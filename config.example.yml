# DuyTris Downloader — example config (sao chép thành config.yml và điền giá trị thật)
# Mật khẩu/secret KHÔNG nên đặt trong file này. Hãy dùng biến môi trường:
#   FLASK_SECRET_KEY, WEBAPP_PASSWORD, NGROK_AUTHTOKEN, OPENAI_API_KEY,
#   GROQ_API_KEY, DEEPSEEK_API_KEY, HUGGINGFACE_TOKEN, FPT_TTS_API_KEY,
#   TIKTOK_CLIENT_KEY, TIKTOK_CLIENT_SECRET, FB_APP_ID, FB_APP_SECRET, TMDB_API_KEY.

auth:
  enabled: false
  cors_origins: []   # empty = local-only mặc định

path: ./Downloaded/
mode: [post]
number: { post: 1, like: 0, allmix: 0, mix: 0, music: 0, collect: 0, collectmix: 0 }
increase: { post: false, like: false, allmix: false, mix: false, music: false }

thread: 5
retry_times: 3
proxy: ''
database: true
database_path: dy_downloader.db

cookies: {}   # đặt trong .cookies.json (gitignored) hoặc qua UI

link:
  - https://www.douyin.com/user/MS4wLjABAAAA6O7EZyfDRYXxJrUTpf91K3tmB4rBROkAw-nYMfld8ss

progress:
  quiet_logs: true

browser_fallback:
  enabled: true
  headless: false
  max_scrolls: 240
  idle_rounds: 8
  wait_timeout_seconds: 600

ngrok:
  enabled: false
  authtoken: ''
  domain: ''
  bind_tls: true
  public_url: ''

# Proxy pool / 4G router rotation
proxies:
  enabled: false
  rotation: { mode: round_robin, per_request: false }
  health_check: { enabled: true, test_url: https://ifconfig.me/ip, timeout_sec: 8 }
  list: []

routers:
  enabled: false
  list: []
  cooldown_sec: 30

# Translation / TTS / Transcript
translation:
  preferred_provider: deepseek
  deepseek_key: ''
  groq_key: ''
  groq_model: llama-3.1-8b-instant
  hf_token: ''
  openai_key: ''
  naming_enabled: true

transcript:
  enabled: false
  api_key: ''
  api_key_env: OPENAI_API_KEY
  api_url: https://api.openai.com/v1/audio/transcriptions
  groq_api_key: ''
  groq_max_mb: 25
  groq_model: whisper-large-v3-turbo
  model: gpt-4o-mini-transcribe
  output_dir: ''
  response_formats: [txt, json]

video_process:
  enabled: false
  model: small
  language: zh
  fpt_api_key: ''   # đặt trong env FPT_TTS_API_KEY
  tts_engine: edge-tts
  tts_voice: vi-VN-HoaiMyNeural
  bg_volume: 0.15
  font_size: 18
  blur_height: 15

upload:
  auto_upload: false
  platform: tiktok
  tiktok:
    title_template: '{title}'
    caption_template: '{title}'
    privacy_status: private
    scopes: [user.info.basic, video.publish]
    client_key: ''
    client_secret: ''
    redirect_uri: http://localhost:5000/api/tiktok/callback
  youtube:
    title_template: '{title}'
    description_template: '{title}'
    privacy_status: private
    short: true

facebook:
  app_id: ''
  app_secret: ''

# Movie review (TMDb)
movie:
  tmdb_api_key: ''        # v3 API key (TMDB Settings → API → API Key)
  tmdb_read_token: ''     # v4 Read Access Token (TMDB Settings → API → API Read Access Token)
  default_language: vi
  default_provider: deepseek
  cache_ttl_hours: 24
  default_template: cinematic

# Novel / Comic → Video
storywriter:
  default_provider: deepseek
  default_target_lang: vi
  chunk: { target_chars_per_segment: 350, max_chars_per_segment: 600, overlap_sentences: 0 }
  comic: { ocr_enabled: false, ocr_provider: tesseract }
  output_dir: ./Downloaded/scripts
